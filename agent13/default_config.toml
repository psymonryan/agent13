# MCP Servers - stdio transport (local process)
[[mcp_servers]]
name = "web_research"
transport = "stdio"
command = "uvx"
args = ["web-research-assistant"]
env = { "SEARXNG_BASE_URL" = "http://searxng/search" }
enabled_tools = []
disabled_tools = []

[[mcp_servers]]
name = "fetch_server"
transport = "stdio"
command = "uvx"
args = ["mcp-server-fetch", "--ignore-robots-txt"]
env = {}
enabled_tools = []
disabled_tools = []
